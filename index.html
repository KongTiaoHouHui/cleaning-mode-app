<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电脑清洁模式</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 24px;
            box-sizing: border-box;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 320px;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .icon-wrapper {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
        }

        .icon-wrapper svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0 0 32px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 32px;
            text-align: left;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        .input-suffix {
            position: absolute;
            right: 16px;
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.4s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.6);
        }

        button:hover::after {
            left: 100%;
        }

        button:active {
            transform: translateY(1px);
        }
        
        /* Remove arrows from number input */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 16V4C21 2.9 20.1 2 19 2H5C3.9 2 3 2.9 3 4V16C3 17.1 3.9 18 5 18H2V20H22V18H19C20.1 18 21 17.1 21 16ZM5 4H19V16H5V4ZM13.1 8H10.9L9 11.2V14H15V11.2L13.1 8Z"/>
            </svg>
        </div>
        <h1>电脑清洁模式</h1>
        <p class="subtitle">锁定屏幕与键盘，让你安心清理设备</p>
        
        <div class="input-group">
            <label for="duration">长按任意键退出时长</label>
            <div class="input-wrapper">
                <input type="number" id="duration" value="3" min="1" max="60">
                <span class="input-suffix">秒</span>
            </div>
        </div>
        
        <button id="start-btn">开启清洁模式</button>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const durationInput = document.getElementById('duration');
        let isStarting = false;

        startBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (isStarting) return;
            isStarting = true;
            startBtn.blur(); // 核心修复：失去焦点，防止长按回车/空格退出时立即再次触发

            let duration = parseInt(durationInput.value, 10);
            if (isNaN(duration) || duration < 1) {
                duration = 3;
            }
            // Add a brief animation before starting
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.3s ease';
            setTimeout(() => {
                window.electronAPI.startCleaning(duration);
                // restore for next time with a slight delay
                setTimeout(() => {
                    document.body.style.opacity = '1';
                    isStarting = false;
                }, 1000);
            }, 300);
        });
    </script>
</body>
</html>
